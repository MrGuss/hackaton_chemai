on:
  pull_request:
    paths:
      - "**.ipynb"
      - ".github/workflows/convert-notebooks.yml"

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.head_ref }}

      - name: Setup
        run: pip install nbconvert ruff

      - name: Convert
        run: |
          for nb in $(find . -name "*.ipynb" -not -path "./.git/*"); do
            jupyter nbconvert --to python "$nb"
          done

      - name: Lint
        run: ruff check --output-format=github .
        continue-on-error: true

      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add $(find . -name "*.py" -not -path "./.git/*")
          git diff --cached --quiet || git commit -m "auto: convert notebooks to .py"
          git push origin HEAD:${{ github.head_ref }}
