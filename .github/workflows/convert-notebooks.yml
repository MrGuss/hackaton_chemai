on:
  push:
    paths:
      - '**.ipynb'
      - '.github/workflows/convert-notebooks.yml'

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - run: pip install nbconvert
      
      - run: |
          for nb in $(find . -name "*.ipynb" -not -path "./.git/*"); do
            jupyter nbconvert --to script "$nb"
          done
      
      - run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add **/*.py
          git diff --cached --quiet || git commit -m "auto: convert notebooks to .py"
          git push

